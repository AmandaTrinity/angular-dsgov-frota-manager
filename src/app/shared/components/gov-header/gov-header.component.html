<header class="br-header">
  <div class="container-lg">
    <div class="header-top">
      <div class="header-logo">
        <img src="/assets/images/logo.svg" alt="logo"/><span class="br-divider vertical"></span>
        <div class="header-sign">Governo Federal</div>
      </div>
      <div class="header-actions">
        <div class="header-links dropdown">
          <button class="br-button circle small" type="button" data-toggle="dropdown" aria-label="Abrir Acesso Rápido"><i class="fas fa-ellipsis-v" aria-hidden="true"></i>
          </button>
          <div class="br-list">
            <div class="header">
              <div class="title">Acesso Rápido</div>
            </div>
            <a class="br-item" href="https://www.gov.br/pt-br/orgaos-do-governo">Orgãos do Governo</a>
            <a class="br-item" href="https://www.gov.br/acessoainformacao/pt-br">Acesso a Informação</a>
            <a class="br-item" href="http://www4.planalto.gov.br/legislacao/">Legislação</a>
            <a class="br-item" href="https://www.gov.br/governodigital/pt-br/acessibilidade-e-usuario/acessibilidade-digital">Acessibilidade</a>
          </div>
        </div><span class="br-divider vertical mx-half mx-sm-1"></span>
        <div class="header-functions dropdown">
          <button class="br-button circle small" type="button" data-toggle="dropdown" aria-label="Abrir Funcionalidades do Sistema"><i class="fas fa-th" aria-hidden="true"></i>
          </button>
          <div class="br-list">
            <div class="header">
              <div class="title">Funcionalidades do Sistema</div>
            </div>
            <div class="br-item">
              <button class="br-button circle small" type="button" aria-label="Funcionalidade 4"><i class="fas fa-adjust" aria-hidden="true"></i><span class="text">Funcionalidade 4</span>
              </button>
            </div>
          </div>
        </div>
        <div class="header-search-trigger">
          <button class="br-button circle" type="button" aria-label="Abrir Busca" data-toggle="search" data-target=".header-search"><i class="fas fa-search" aria-hidden="true"></i>
          </button>
        </div>
        <div class="header-login">
          <div class="header-sign-in">
            <button class="br-sign-in small" type="button" data-trigger="login"><i class="fas fa-user" aria-hidden="true"></i><span class="d-sm-inline">Entrar</span>
            </button>
          </div>
          <div class="header-avatar"></div>
        </div>
      </div>
    </div>
    <div class="header-bottom">
      <div class="header-menu">
        <div class="header-menu-trigger">
          <button class="br-button small circle" type="button" aria-label="Menu" data-toggle="menu" data-target="#main-navigation" id="navigation"><i class="fas fa-bars" aria-hidden="true"></i>
          </button>
        </div>
        <div class="header-info">
          <div class="header-title">Frota Gerencial</div>
          <div class="header-subtitle">Visualize, gerencie e monitore os veículos da frota.</div>
        </div>
      </div>
    </div>
  </div>
</header>
