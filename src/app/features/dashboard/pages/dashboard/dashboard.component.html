<div class="container-lg">
  <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
    <div>
      <h1>Dashboard</h1>
      <p>Acompanhe os principais indicadores e gráficos sobre os abastecimentos da frota.</p>
    </div>
    <button class="br-button primary mb-3 consulta-btn" type="button" routerLink="/consulta">Acessar Consulta</button>

  </div>
  <div class="kpi-row">
    <app-kpi-card title="Preço Médio" [value]="(dashboardFacade.precoMedioGasolina() | currency: 'BRL') ?? 'R$ 0,00'"
      subtitle="Gasolina (Dez/2024)" icon="fa-gas-pump" [loading]="dashboardFacade.loading()">
    </app-kpi-card>
    <app-kpi-card title="Preço Médio" [value]="(dashboardFacade.precoMedioDiesel() | currency: 'BRL') ?? 'R$ 0,00'"
      subtitle="Diesel (Dez/2024)" icon="fa-truck" [loading]="dashboardFacade.loading()">
    </app-kpi-card>
    <app-kpi-card title="Total de Litros" [value]="dashboardFacade.totalLitros()" subtitle="Últimos 30 dias"
      icon="fa-fill-drip" [loading]="dashboardFacade.loading()">
    </app-kpi-card>
  </div>

  <div class="row">
    <div class="col-lg-6 mb-4">
      <div class="chart-card">
        <h3 class="h3">Evolução de Preços (Últimos 6 meses)</h3>
        @if (lineChartOptions(); as options) {
        <div>
          <apx-chart [series]="options.series" [chart]="options.chart" [xaxis]="options.xaxis" [colors]="options.colors"
            [stroke]="options.stroke" [markers]="options.markers" [legend]="options.legend" [tooltip]="options.tooltip"
            [states]="options.states">
          </apx-chart>
        </div>
        }
      </div>
    </div>

    <div class="col-lg-6 mb-4">
      <div class="chart-card">
        <h3 class="h3">Consumo por Estado (Top 10)</h3>
        @if (barChartOptions(); as options) {
        <div>
          <apx-chart [series]="options.series" [chart]="options.chart" [xaxis]="options.xaxis" [colors]="options.colors"
            [tooltip]="options.tooltip">
          </apx-chart>
        </div>
        }
      </div>
    </div>
  </div>
</div>
